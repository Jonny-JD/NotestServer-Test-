name: CI/CD Autotests

on:
  workflow_dispatch:

jobs:
  build: 
    runs-on: self-hosted
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      IMAGE_SHA: ${{ github.sha }}
      BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/notes-backend:${{ github.sha }}-test
      FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/notes-frontend:${{ github.sha }}-test

    
    steps:
    - name: Checkout autotests repo
      uses: actions/checkout@v4

    - name: Clone frontend
      uses: actions/checkout@v4
      with:
        repository: Jonny-JD/NotesServer-F-
        ref: feature
        path: frontend
        
    - name: Clone backend
      uses: actions/checkout@v4
      with:
        repository: Jonny-JD/NotesServer-B-
        ref: feature
        path: backend
        
    - name: Reset Docker config
      run: |
        rm -f ~/.docker/config.json
        echo "{\"auths\":{\"https://index.docker.io/v1/\":{\"auth\":\"$(echo -n "${{ secrets.DOCKERHUB_USERNAME }}:${{ secrets.DOCKERHUB_TOKEN }}" | base64)\"}}}" > ~/.docker/config.json

    - name: Run make frontend build
      env: 
        DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        GITHUB_SHA: ${{ github.sha }}
      run: DOCKER_BUILDKIT=0 make -C frontend build-test

    - name: Make gradlew executable
      run: chmod +x backend/gradlew
  
    - name: Run make backend build
      env: 
        DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        GITHUB_SHA: ${{ github.sha }}
      run: DOCKER_BUILDKIT=0 make -C backend build-test
      
    - name: Run make frontend push
      env: 
        DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      run: make -C frontend push-test
    
    - name: Run make backend push
      env: 
        DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      run: make -C backend push-test
    
    - name: Kube config
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
      
    - name: Run make create test namespace
      run: make create-test-namespace
    
    - name: Run make create secrets
      run: make create-secrets
      env:
        TEST_DB_USER: ${{ secrets.TEST_DB_USER }}
        TEST_DB_PASS: ${{ secrets.TEST_DB_PASS }}
      
    - name: Run make deploy test backend
      run: make deploy-test-backend
      env:
        IMAGE_NAME: ${{ env.BACKEND_IMAGE }}

    - name: Print backend logs on fail
      if: failure()
      run: kubectl logs -l cybernotes=backend -n test --tail=200

    - name: Run make deploy test frontend
      run: make deploy-test-frontend
      env:
        IMAGE_NAME: ${{ env.FRONTEND_IMAGE }}

    - name: Print frontend logs on fail
      if: failure()
      run: kubectl logs -l cybernotes=frontend -n test --tail=200

    - name: Run make deploy ingress
      run: make deploy-test-ingress

    - name: Wait for backend rollout
      run: kubectl rollout status deployment/backend -n test

    - name: Check ingress
      run: |
        kubectl get ingress -n test
        curl http://$(kubectl get ingress ingress -n test -o jsonpath='{.status.loadBalancer.ingress[0].ip}')/api/v1/auth/me

    - name: Wait for frontend rollout
      run: kubectl rollout status deployment/frontend -n test

    - name: Run make deploy selenium hub
      run: make deploy-selenium-hub

    - name: Wait for hub rollout
      run: kubectl rollout status deployment/selenium-hub -n test

    - name: Run make deploy selenium service
      run: make deploy-selenium-service

    - name: Run make deploy chrome
      run: make deploy-chrome

    - name: Wait for chrome rollout
      run: kubectl rollout status deployment/selenium-chrome -n test

    - name: Run make deploy firefox
      run: make deploy-firefox

    - name: Wait for firefox rollout
      run: kubectl rollout status deployment/selenium-firefox -n test

    - name: Make gradlew executable
      run: chmod +x gradlew
        
    - name: Wait for selenium ready
      run: sleep 10

    - name: Port forward selenium hub
      run: kubectl port-forward svc/selenium-hub 4444:4444 -n test &

    - name: Wait for port forward
      run: sleep 3
      
    - name: Run autotests
      run: ./gradlew test
      env:
        SELENIUM_HUB: http://localhost:4444
        APP_URL: http://frontend-service
        
    - name: Upload test artifacts
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-reports
        path: |
          build/reports
          build/screenshots

    - name: Run make cleanup
      run: make cleanup-namespace
